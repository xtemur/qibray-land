L.control.zoom({position:'topright'}).addTo(map);   // keep zoom clear of the hamburger
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {maxZoom:19, attribution:'&copy; OpenStreetMap'}).addTo(map);
L.marker([41.308910, 69.257400]).addTo(map).bindPopup('Центр Ташкента');

// hamburger drawer (mobile)
const _body = document.body;
const _close = () => _body.classList.remove('menu-open');
document.getElementById('burger').onclick = () => _body.classList.add('menu-open');
document.getElementById('closepanel').onclick = _close;
document.getElementById('backdrop').onclick = _close;

function ppsColor(p){
  if(p.price_outlier) return '#7c3a9a';
  const v = p.std_pps || p.price_per_sotka_usd || 0;
  if(v < 8000) return '#2f7a3f';
  if(v < 18000) return '#c8b34a';
  return '#b35a3a';
}
function radiusPx(p){
  const a = p.area_sotka || 4;
  return Math.max(4, Math.min(13, 3 + Math.sqrt(a)*1.7));
}
function daysSince(iso){
  if(!iso) return 1e9;
  const t = Date.parse(iso); if(isNaN(t)) return 1e9;
  return (Date.now()-t)/86400000;
}
function money(v){ return v? '$'+Math.round(v).toLocaleString() : '—'; }

const layer = L.layerGroup().addTo(map);
function pass(p){
  const v = p.std_pps || p.price_per_sotka_usd;
  const pmin = parseFloat(document.getElementById('pmin').value);
  const pmax = parseFloat(document.getElementById('pmax').value);
  if(!isNaN(pmin) && (v||0) < pmin) return false;
  if(!isNaN(pmax) && (v||1e12) > pmax) return false;
  const a = p.area_sotka;
  const amin = parseFloat(document.getElementById('amin').value);
  const amax = parseFloat(document.getElementById('amax').value);
  if(!isNaN(amin) && (a||0) < amin) return false;
  if(!isNaN(amax) && (a||1e9) > amax) return false;
  const km = +document.getElementById('km').value;
  if(km < 40 && (p.dist_to_center_km==null || p.dist_to_center_km > km)) return false;
  const nd = +document.getElementById('newd').value;
  if(nd < 60 && daysSince(p.first_seen) > nd) return false;
  if(document.getElementById('gas').checked && !p.comm_gas) return false;
  if(document.getElementById('kad').checked && !p.kadastr_text) return false;
  if(document.getElementById('noout').checked && p.price_outlier) return false;
  return true;
}
function esc(s){ return (s||'').replace(/[&<>"`]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','`':'&#96;'}[c])); }
function popup(p){
  const basis = p.price_basis==='per_sotka' ? ' <span class="k">(цена за сотку)</span>' : '';
  const out = p.price_outlier ? '<div class="warn">⚠ цена сильно отличается от соседних</div>' : '';
  const nb = p.nbr_median_pps ? `<div class="k">по соседям ≈ $${Math.round(p.nbr_median_pps).toLocaleString()}/сотка</div>` : '';
  const safe = (p.url||'').match(/^https?:\/\//) ? p.url : '#';
  return `<div class="pop"><b style="font-size:16px">${money(p.std_pps||p.price_per_sotka_usd)}/сотка</b>${basis}
    <div class="k">≈ ${money(p.total_usd)} итого · ${p.area_sotka||'?'} сот · ${p.dist_to_center_km!=null?p.dist_to_center_km+' км':'?'}</div>
    <div>${esc(p.district_name)}</div>
    ${nb}${out}
    <div class="k">газ ${p.comm_gas?'✓':'✗'} · кадастр ${p.kadastr_text?'~':'✗'} · оценка ${p.score!=null?Math.round(p.score):'?'}</div>
    <div class="k">${p.geocoded?'📍 точное место (по адресу)':'≈ примерно (район)'}</div>
    <div style="margin-top:5px"><a href="${esc(safe)}" target="_blank" rel="noopener">${p.source==='telegram'?'открыть в Telegram':'открыть на OLX'} ↗</a></div>
    <div class="k" style="margin-top:3px">${esc((p.title||'').slice(0,80))}</div></div>`;
}
function render(){
  layer.clearLayers();
  let n=0;
  for(const p of DATA){
    if(!pass(p)) continue;
    n++;
    L.circleMarker([p.lat,p.lon], {radius:radiusPx(p), fillColor:ppsColor(p),
      color:'#00000055', weight:1, opacity:1, fillOpacity:.8})
      .addTo(layer).bindPopup(popup(p));
  }
  document.getElementById('shown').textContent = n;
}
['pmin','pmax','amin','amax','km','newd','gas','kad','noout'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('input', ()=>{
    document.getElementById('kmval').textContent = (+document.getElementById('km').value>=40)?'все':document.getElementById('km').value;
    document.getElementById('newval').textContent = (+document.getElementById('newd').value>=60)?'∞':document.getElementById('newd').value;
    render();
  });
});
render();
</script></body></html>
